name: Pull triton images to local repo

on:
  push:
    branches:
    - main

env:
  REGISTRY: ghcr.io

jobs:

  # only run this workflow if changes have been
  # made to the triton Dockerfile or to this workflow,
  # which contain all the info that we need
  changes:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'ML4GW'
    outputs:
      triton: ${{ steps.filter.outputs.triton }}
    steps:
    -
      name: Checkout
      uses: actions/checkout@v4
    -
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          triton:
          - '.github/triton.Dockerfile'
          - '.github/workflows/triton-build.yaml'
  # now define the main job which will build
  # and push the containers in parallel
  main:
    needs: changes
    if: ${{ needs.changes.outputs.triton == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - trt-version: 8.2.3
          triton-tag: 22.02
        - trt-version: 8.4.1
          triton-tag: 22.07
        - trt-version: 8.5.1
          triton-tag: 22.12
        - trt-version: 8.5.2.2
          triton-tag: 23.01
        - trt-version: 8.6.1.6
          triton-tag: 24.01
        - trt-version: 10.0.1.6
          triton-tag: 24.05
        - trt-version: 10.1.0.27
          triton-tag: 24.06
        - trt-version: 10.2.0.19
          triton-tag: 24.07
        - trt-version: 10.3.0.26
          triton-tag: 24.08
        - trt-version: 10.4.0.26
          triton-tag: 24.09
        - trt-version: 10.5.0.18
          triton-tag: 24.10
        - trt-version: 10.6.0.26
          triton-tag: 24.11
        - trt-version: 10.7.0.23
          triton-tag: 24.12
    steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
    -
      name: Checkout
      uses: actions/checkout@v4
    -
      name: Log in to container registry
      uses: docker/login-action@master
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    -
      name: Triton Server pull-push
      env:
        TAG: ${{ env.REGISTRY }}/ml4gw/hermes/tritonserver:${{ matrix.triton-tag }}
      run: |
        docker build \
            -f .github/triton.Dockerfile \
            --build-arg TRITON_TAG=${{ matrix.triton-tag }} \
            --build-arg TENSORRT_VERSION=${{ matrix.trt-version }} \
            -t ${{ env.TAG }} \
            .github/
        docker push ${{ env.TAG }}

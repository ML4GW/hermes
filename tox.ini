[tox]
envlist = py{39,310,311,312}-{aeriel,tf,torch}
isolated_build = true

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
commands =
    pytest -m {env:marker} {env:test_dir}
deps = 
    pytest>=7,<8

[testenv:py{311,312,313,314}-aeriel]
setenv = 
    test_dir = tests/aeriel
    marker = ""

[testenv:py{311,312,313,314}-tf]
extras = tensorflow
setenv =
    test_dir = tests/quiver
    marker = "not gcs and not torch"

[testenv:py{311,312,313,314}-torch]
extras = torch
setenv =
    test_dir = tests/quiver
    marker = "not gcs and not tensorflow"
